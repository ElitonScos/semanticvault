services:
  db:
    image: pgvector/pgvector:pg16
    container_name: semanticvault_db
    environment:
      POSTGRES_USER: svuser
      POSTGRES_PASSWORD: svpass
      POSTGRES_DB: semanticvault
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U svuser -d semanticvault"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: semanticvault_api
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
